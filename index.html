<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Ansible Automation Platform - Login</title>
</head>
<body>

    <div class="login-container">
        <!-- Brand Section -->
        <div class="brand-header">
            <div class="logo-icon"></div>
            <div>
                <span class="brand-title">Red Hat</span>
                <h1 class="platform-title">Ansible Automation Platform</h1>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Please log in to your account to continue.</p>

            <form class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Log In</button>
            </form>
        </div>

        <!-- Footer Info -->
        <footer class="login-footer">
            <p>Version V5 — Dev Environment</p>
            <p>&copy; 2026 Raghunandan Mohan Keluskar</p>
        </footer>
    </div>

</body>
</html>
